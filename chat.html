<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения - OshEstate</title>
    <link rel="stylesheet" href="style_main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script>if(localStorage.getItem('oshe_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        .chat-container {
            display: flex;
            height: calc(100vh - 80px);
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin: 20px 0;
        }
        
        .chat-sidebar {
            width: 350px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: var(--primary);
            color: white;
            text-align: center;
        }
        
        .chat-search {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .chat-search input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            outline: none;
            font-size: 16px; /* iOS не зумит */
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 5px;
        }
        
        .chat-item:hover {
            background: #e9ecef;
        }
        
        .chat-item.active {
            background: var(--accent);
            color: white;
        }
        
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .chat-message {
            font-size: 0.85rem;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            font-size: 0.75rem;
            opacity: 0.5;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-conversation-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
        }
        
        .chat-conversation-header h3 {
            margin: 0;
            color: var(--primary);
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.sent {
            justify-content: flex-end;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.received .message-bubble {
            background: white;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }
        
        .message.sent .message-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 4px;
        }
        
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }
        
        .chat-input-form {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e9ecef;
            border-radius: 25px;
            outline: none;
            resize: none;
            font-size: 16px; /* iOS не зумит */
        }
        
        .chat-send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .chat-send-btn:hover {
            background: var(--accent-dark);
            transform: scale(1.05);
        }
        
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-light);
        }
        
        .empty-chat i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .online-indicator {
            width: 8px;
            height: 8px;
            background: #27ae60;
            border-radius: 50%;
            margin-left: 8px;
        }
        
        .unread-badge {
            background: #e74c3c;
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }
        
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                height: calc(100vh - 60px); /* Убрал margin, учитываем только navbar */
                margin: 0;
                border-radius: 0;
            }

            .chat-sidebar {
                width: 100%;
                height: 280px;
                border-right: none;
                border-bottom: 1px solid #e9ecef;
            }

            .chat-main {
                flex: 1;
                min-height: 0; /* Важно для flex-скролла */
                display: flex;
                flex-direction: column;
            }

            .chat-messages {
                flex: 1;
                min-height: 0;
                padding: 12px;
            }

            .chat-input-container {
                padding: 12px 14px;
                padding-bottom: max(12px, env(safe-area-inset-bottom, 12px)); /* iOS home indicator */
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        /* iOS keyboard fix */
        @supports (-webkit-touch-callout: none) {
            @media (max-width: 768px) {
                .chat-container {
                    height: 100vh;
                    height: -webkit-fill-available;
                }
            }
        }
    </style>
</head>
<body data-page="chat">
    <div id="toast-container"></div>
    
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Osh<span>Estate</span></a>
            <ul class="nav-links" id="nav-links-container">
                <li><a href="index.html">Главная</a></li>
                <li><a href="buy.html">Купить</a></li>
                <li><a href="rent.html">Снять</a></li>
                <li><a href="land.html">Участки</a></li>
                <li><a href="commerce.html">Коммерция</a></li>
                <li><a href="add.html">Подать объявление</a></li>
                <li><a href="favorites.html">Избранное</a></li>
                <li><a href="profile.html">Профиль</a></li>
                <li><a href="#" id="logout-link" class="btn-login">Выйти</a></li>
            </ul>
            <button id="darkModeToggle" class="dark-mode-btn" aria-label="Переключить тему"><i class="fas fa-moon"></i></button>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>
    
    <div class="container">
        <div class="chat-container">
            <!-- Боковая панель со списком чатов -->
            <div class="chat-sidebar">
                <div class="chat-header">
                    <h2>Сообщения</h2>
                </div>
                <div class="chat-search">
                    <input type="text" id="chatSearch" placeholder="Поиск сообщений...">
                </div>
                <div class="chat-list" id="chatList">
                    <div class="empty-chat">
                        <i class="fas fa-comments"></i>
                        <p>Нет сообщений</p>
                    </div>
                </div>
            </div>
            
            <!-- Основная область чата -->
            <div class="chat-main">
                <div id="chatContent">
                    <div class="empty-chat">
                        <i class="fas fa-comment-dots"></i>
                        <h3>Выберите чат для начала общения</h3>
                        <p>Начните диалог с владельцем объявления</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
